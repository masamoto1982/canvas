<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>canvas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>canvas <span class="version">ver.202505230915</span></h1>
    </header>
    
    <main class="main">
      <section class="editor-section">
        <div class="section-header">
          <h2>txt-input</h2>
          <div class="controls">
            <button id="clear-btn" class="btn btn-secondary">clear</button>
            <button id="execute-btn" class="btn btn-primary">execute</button>
          </div>
        </div>
        <div id="editor" class="editor" contenteditable="true" spellcheck="false"></div>
        <div class="color-palette">
          <button class="color-btn active" data-color="red" data-type="boolean">boolean</button>
          <button class="color-btn" data-color="yellow" data-type="number">number</button>
          <button class="color-btn" data-color="green" data-type="string">string</button>
          <button class="color-btn" data-color="blue" data-type="symbol">symbol</button>
        </div>
      </section>
      
      <section class="output-section">
        <h2>output</h2>
        <div id="output" class="output"></div>
      </section>
      
      <section class="d2d-section">
        <h2>d2d-input</h2>
        <div id="d2d-container" class="d2d-container">
          <canvas id="canvas"></canvas>
          <div id="dot-grid" class="dot-grid"></div>
          <div id="special-controls" class="special-controls"></div>
        </div>
      </section>
    </main>
  </div>
  
  <script src="constants.js"></script>
  <script src="types.js"></script>
  <script src="fraction.js"></script>
  <script src="language.js"></script>
  <script src="editor.js"></script>
  <script src="d2d-input.js"></script>
  <script src="ui-manager.js"></script>
  <script src="app.js"></script>
</body>
</html>
