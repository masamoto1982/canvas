<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Canvas Language IDE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- ヘッダー -->
    <header class="header">
      <h1>Canvas Language</h1>
      <div class="header-controls">
        <button id="execute-btn" class="control-btn primary">実行</button>
        <button id="clear-btn" class="control-btn">クリア</button>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main-content">
      <!-- エディターセクション -->
      <section class="editor-section">
        <div class="editor-header">
          <h2>コード</h2>
          <div class="color-controls">
            <button class="color-btn" data-color="red" data-type="number">数値</button>
            <button class="color-btn" data-color="yellow" data-type="string">文字列</button>
            <button class="color-btn" data-color="green" data-type="variable">変数</button>
            <button class="color-btn active" data-color="blue" data-type="symbol">記号</button>
          </div>
        </div>
        <div id="editor" class="editor" tabindex="0"></div>
      </section>

      <!-- 出力セクション -->
      <section class="output-section">
        <div class="output-header">
          <h2>実行結果</h2>
        </div>
        <div id="output" class="output"></div>
      </section>
    </main>

    <!-- D2D入力インターフェース -->
    <div id="d2d-container" class="d2d-container">
      <canvas id="canvas" class="d2d-canvas"></canvas>
      <div id="dot-grid" class="dot-grid"></div>
      <div id="special-controls" class="special-controls"></div>
    </div>
  </div>

  <!-- JavaScriptファイルの読み込み -->
  <script src="js/constants.js"></script>
  <script src="js/data-model.js"></script>
  <script src="js/txt-input.js"></script>
  <script src="js/d2d-input.js"></script>
  <script src="js/output.js"></script>
  <script src="js/language.js"></script>
  <script src="js/ui-manager.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
