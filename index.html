<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>canvas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <article>
        <h1>canvas ver.202505151211</h1>

        <div id="mobile-container">
            <div id="upper-half">
                <section id="output-section" class="output-section hide">
                    <h2>output</h2>
                    <textarea id="output" readonly></textarea>
                </section>

               <section id="text-section" class="input-section">
    <h2>txt-input</h2>
	
	<div class="button-container">
        <button id="clear-button">clear</button>
        <button id="execute-button">execute</button>
    </div>
	
    <div id="txt-input" contenteditable="true" class="editor" spellcheck="false"></div>
	
	
	
    <div class="color-buttons">
    <button id="color-red" class="color-btn" data-color="red">boolean</button>
    <button id="color-green" class="color-btn" data-color="green">number</button>
    <button id="color-blue" class="color-btn" data-color="blue">string</button>
    <button id="color-cyan" class="color-btn" data-color="cyan">symbol</button>
    </div>
    
</section>
            </div>

            <section id="d2d-section">
                <h2>d2d-input</h2>
                <div id="d2d-input">
                    <div id="dot-grid"></div>
                    <div id="special-row"></div>
                    <canvas id="line-canvas"></canvas>
                </div>
            </section>
        </div>
    </article>

    <script src="script.js"></script>
</body>

</html>
